<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
</head>
<body>
  <audio id="bgMusic" loop>
    <source src="naruto-main-theme-made-with-Voicemod.mp3" type="audio/mpeg">
  </audio>
  <div class="top-bar">
    <button type="button" class="music-btn" id="musicBtn" aria-label="Play music" title="Music on/off">🔇</button>
    <div class="clock" id="clock" aria-live="polite"></div>
  </div>
  <div class="app">
    <header class="header">
      <h1>Todo</h1>
      <p class="subtitle">Add tasks and tick them off.</p>
    </header>

    <form class="add-form" id="addForm">
      <input
        type="text"
        id="todoInput"
        class="todo-input"
        placeholder="What do you need to do?"
        autocomplete="off"
        maxlength="200"
      />
      <button type="submit" class="btn-add" id="addBtn" aria-label="Add todo">
        Add
      </button>
    </form>

    <div class="filters" id="filters">
      <button type="button" class="filter-btn active" data-filter="all">All</button>
      <button type="button" class="filter-btn" data-filter="active">Active</button>
      <button type="button" class="filter-btn" data-filter="completed">Completed</button>
    </div>

    <ul class="todo-list" id="todoList"></ul>

    <div class="footer" id="footer">
      <span class="count" id="count">0 items left</span>
      <button type="button" class="btn-clear" id="clearCompleted">Clear completed</button>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    function updateClock() {
      const el = document.getElementById('clock');
      if (el) el.textContent = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }
    updateClock();
    setInterval(updateClock, 1000);

    (function() {
      const audio = document.getElementById('bgMusic');
      const btn = document.getElementById('musicBtn');
      if (!audio || !btn) return;
      btn.addEventListener('click', function() {
        if (audio.paused) {
          audio.play().catch(function() {});
          btn.classList.remove('muted');
          btn.textContent = '♪';
          btn.setAttribute('aria-label', 'Pause music');
        } else {
          audio.pause();
          btn.classList.add('muted');
          btn.textContent = '🔇';
          btn.setAttribute('aria-label', 'Play music');
        }
      });
    })();
  </script>
</body>
</html>
